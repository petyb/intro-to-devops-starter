name: pr

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: install deps
        run: pip install -r requirements-dev.txt

      - name: run unit tests
        run: pytest tests/test_main.py -v --junitxml=unit-results.xml

      - name: publish test results to PR
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: unit-results.xml
          check_name: unit-tests
          comment_mode: always

  terraform:
    name: terraform fmt + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.4"

      - name: terraform fmt (check)
        run: terraform fmt -recursive -check infrastructure/

      - name: validate aws stack
        working-directory: infrastructure/aws
        run: |
          terraform init -backend=false -input=false
          terraform validate

      - name: validate local stack
        working-directory: infrastructure/local
        run: |
          terraform init -backend=false -input=false
          terraform validate
