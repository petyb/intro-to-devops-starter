name: main

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: main
  cancel-in-progress: false

env:
  IMAGE_NAME: ${{ github.repository }}
  REGISTRY: ghcr.io

jobs:
  unit-tests:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - run: pip install -r requirements-dev.txt
      - run: pytest tests/test_main.py -v

  build-test-push:
    name: build, integration-test, push
    runs-on: ubuntu-latest
    needs: unit-tests
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: version
        name: compute version
        run: |
          short_sha=$(git rev-parse --short HEAD)
          echo "version=0.1.${{ github.run_number }}+${short_sha}" >> "$GITHUB_OUTPUT"
          echo "tag_semver=0.1.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build image (local load for integration tests)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: fruitapi:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: run image
        run: |
          docker run -d --name fruitapi -p 8000:8000 fruitapi:ci
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then exit 0; fi
            sleep 1
          done
          echo "FruitAPI never became healthy" >&2
          docker logs fruitapi
          exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - run: pip install -r requirements-dev.txt

      - name: run integration tests
        env:
          FRUITAPI_BASE_URL: http://127.0.0.1:8000
        run: pytest tests/test_integration.py -v

      - name: stop container
        if: always()
        run: docker rm -f fruitapi || true

      - name: push image with versioned tags
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag_semver }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: generate SBOM (SPDX) for pushed image
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag_semver }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true
