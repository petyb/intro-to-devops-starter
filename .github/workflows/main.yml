name: main

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write   # OIDC token for AWS role assumption in the deploy job

concurrency:
  group: main
  cancel-in-progress: false

env:
  IMAGE_NAME: ${{ github.repository }}
  REGISTRY: ghcr.io

jobs:
  unit-tests:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - run: pip install -r requirements-dev.txt
      - run: pytest tests/test_main.py -v

  build-test-push:
    name: build, integration-test, push
    runs-on: ubuntu-latest
    needs: unit-tests
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: version
        name: compute version
        run: |
          short_sha=$(git rev-parse --short HEAD)
          echo "version=0.1.${{ github.run_number }}+${short_sha}" >> "$GITHUB_OUTPUT"
          echo "tag_semver=0.1.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build image (local load for integration tests)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: fruitapi:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: start MySQL for integration tests
        run: |
          docker network create fruitnet
          docker run -d --name mysql --network fruitnet \
            -e MYSQL_ROOT_PASSWORD=rootpass \
            -e MYSQL_DATABASE=fruitapi \
            -e MYSQL_USER=fruitapi \
            -e MYSQL_PASSWORD=fruitapi \
            mysql:8.4
          for i in $(seq 1 60); do
            if docker exec mysql mysqladmin ping -h 127.0.0.1 -uroot -prootpass --silent 2>/dev/null; then exit 0; fi
            sleep 2
          done
          echo "MySQL never became ready" >&2
          docker logs mysql
          exit 1

      - name: run image
        run: |
          docker run -d --name fruitapi --network fruitnet -p 8000:8000 \
            -e STORE_BACKEND=mysql \
            -e DB_HOST=mysql \
            -e DB_PORT=3306 \
            -e DB_NAME=fruitapi \
            -e DB_USER=fruitapi \
            -e DB_PASSWORD=fruitapi \
            fruitapi:ci
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then exit 0; fi
            sleep 1
          done
          echo "FruitAPI never became healthy" >&2
          docker logs fruitapi
          exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - run: pip install -r requirements-dev.txt

      - name: run integration tests
        env:
          FRUITAPI_BASE_URL: http://127.0.0.1:8000
        run: pytest tests/test_integration.py -v

      - name: dump container logs on failure
        if: failure()
        run: |
          echo "::group::fruitapi"; docker logs fruitapi 2>&1 || true; echo "::endgroup::"
          echo "::group::mysql";    docker logs mysql    2>&1 || true; echo "::endgroup::"

      - name: stop containers
        if: always()
        run: |
          docker rm -f fruitapi || true
          docker rm -f mysql || true
          docker network rm fruitnet || true

      - name: push image with versioned tags
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag_semver }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: generate SBOM (SPDX) for pushed image
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag_semver }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true

  deploy:
    name: deploy to ECS
    runs-on: ubuntu-latest
    needs: build-test-push
    env:
      AWS_REGION: eu-central-1
      AWS_ROLE_ARN: arn:aws:iam::176938214523:role/fruitapi-dev-gh-deploy
      ECS_CLUSTER: fruitapi-dev-cluster
      ECS_SERVICE: fruitapi-dev-svc
      TASK_FAMILY: fruitapi-dev-task
      CONTAINER_NAME: fruitapi
      NEW_IMAGE: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
    steps:
      - name: assume AWS role via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: build new task definition with the just-pushed image
        id: taskdef
        run: |
          aws ecs describe-task-definition \
            --task-definition "$TASK_FAMILY" \
            --query 'taskDefinition' > current.json

          # strip read-only fields ECS rejects on register, and swap the image
          jq --arg image "$NEW_IMAGE" --arg cname "$CONTAINER_NAME" '
            del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                .compatibilities, .registeredAt, .registeredBy)
            | .containerDefinitions |= map(if .name == $cname then .image = $image else . end)
          ' current.json > new.json

      - name: register new task definition revision
        id: register
        run: |
          new_arn=$(aws ecs register-task-definition \
            --cli-input-json file://new.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "new_arn=$new_arn" >> "$GITHUB_OUTPUT"
          echo "Registered $new_arn"

      - name: update ECS service & wait for steady state
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "${{ steps.register.outputs.new_arn }}" \
            > /dev/null
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"

      - name: smoke test the rolled-out service
        env:
          ALB_URL: http://fruitapi-dev-alb-2001998178.eu-central-1.elb.amazonaws.com
        run: |
          for i in $(seq 1 30); do
            body=$(curl -fsS "$ALB_URL/health" 2>/dev/null || true)
            if [ "$body" = '{"status":"ok"}' ]; then
              echo "post-deploy health OK"
              exit 0
            fi
            sleep 2
          done
          echo "post-deploy health check failed" >&2
          exit 1
